<body>
    <header class="app-header"></header>

    <div class="editor-layout">
        <aside class="editor-sidebar"></aside>

        <main class="editor-viewport">
            <div class="viewport-header">
                <h1 class="viewport-title">🤪 Meme Generator</h1>
                <div class="viewport-actions">
                    <button class="btn btn-danger" id="revert-btn">🔄 Reset</button>
                </div>
            </div>

            <!-- Workspace -->
            <div class="canvas-wrapper">
                <div class="canvas-container">
                    <canvas id="editor-canvas" class="editor-canvas"></canvas>
                </div>
            </div>
        </main>

        <!-- Right settings panel -->
        <section class="editor-control-panel">
            <div class="panel-section">
                <h3 class="panel-section-title">Meme Text Layer</h3>
                
                <div class="control-group">
                    <label class="control-label">Top Text</label>
                    <input type="text" class="input-text" id="meme-top" value="WHEN YOU CODE">
                </div>

                <div class="control-group">
                    <label class="control-label">Bottom Text</label>
                    <input type="text" class="input-text" id="meme-bottom" value="WITHOUT A PLAN">
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-section-title font-section">Typography</h3>
                
                <div class="control-group">
                    <div class="control-label">
                        <span>Text Size</span>
                        <span class="control-value" id="size-val">52px</span>
                    </div>
                    <input type="range" id="text-size" min="20" max="120" value="52">
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" class="checkbox-input" id="caps-chk" checked>
                        Force Uppercase Letters
                    </label>
                </div>
            </div>

            <div class="apply-actions">
                <button class="btn btn-primary" id="download-btn">⬇️ Download Meme</button>
                <button class="btn btn-secondary" id="apply-btn">💾 Save Canvas Changes</button>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/meme.js"></script>
