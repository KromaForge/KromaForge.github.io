    <link rel="stylesheet" href="css/style.css">
    <style>
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }
        .color-picker {
            appearance: none;
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }
        .color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        .color-picker::-webkit-color-swatch {
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header class="app-header"></header>

    <div class="editor-layout">
        <aside class="editor-sidebar"></aside>

        <main class="editor-viewport">
            <div class="viewport-header">
                <h1 class="viewport-title">🔳 Aspect Fitter & Padding</h1>
                <div class="viewport-actions">
                    <button class="btn btn-danger" id="revert-btn">🔄 Reset</button>
                    <button class="btn btn-primary" id="download-btn">📤 Export</button>
                </div>
            </div>

            <!-- Workspace -->
            <div class="canvas-wrapper">
                <div class="canvas-container">
                    <canvas id="editor-canvas" class="editor-canvas"></canvas>
                </div>
            </div>
        </main>

        <!-- Right Side Settings Panel -->
        <section class="editor-control-panel">
            <div class="panel-section">
                <h3 class="panel-section-title">Fit Ratio</h3>
                <div class="grid-select" id="ratio-selector">
                    <button class="grid-select-btn active" data-ratio="1">1:1 Square</button>
                    <button class="grid-select-btn" data-ratio="0.8">4:5 Portrait</button>
                    <button class="grid-select-btn" data-ratio="1.777">16:9 Landscape</button>
                    <button class="grid-select-btn" data-ratio="0.562">9:16 Story</button>
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-section-title">Padding Style</h3>
                <div class="grid-select" id="style-selector">
                    <button class="grid-select-btn active" data-style="color">Solid Color</button>
                    <button class="grid-select-btn" data-style="blur">Blur Background</button>
                </div>

                <div class="control-group" id="color-group" style="margin-top: 1.25rem;">
                    <label class="control-label">Border Color</label>
                    <div class="color-picker-wrapper">
                        <input type="color" class="color-picker" id="pad-color" value="#ffffff">
                        <input type="text" class="input-text" id="pad-color-hex" value="#ffffff" style="max-width: 120px;">
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-section-title">Image Scaling</h3>
                <div class="control-group">
                    <div class="control-label">
                        <span>Center Image Scale</span>
                        <span class="control-value" id="scale-value">90%</span>
                    </div>
                    <input type="range" id="pad-scale" min="40" max="100" value="90">
                </div>
            </div>

        </section>
    </div>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/pad.js"></script>
</body>
