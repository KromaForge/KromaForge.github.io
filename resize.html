<body>
    <header class="app-header"></header>

    <div class="editor-layout">
        <aside class="editor-sidebar"></aside>

        <main class="editor-viewport">
            <div class="viewport-header">
                <h1 class="viewport-title">📐 Image Resizer</h1>
                <div class="viewport-actions">
                    <button class="btn btn-danger" id="revert-btn">🔄 Reset</button>
                    <button class="btn btn-primary" id="download-btn">📤 Export</button>
                </div>
            </div>

            <!-- Workspace -->
            <div class="canvas-wrapper">
                <div class="canvas-container">
                    <canvas id="editor-canvas" class="editor-canvas"></canvas>
                </div>
            </div>
        </main>

        <!-- Right Side Panel -->
        <section class="editor-control-panel">
            <div class="panel-section">
                <h3 class="panel-section-title">Current Resolution</h3>
                <div class="control-group">
                    <label class="control-label">Original dimensions</label>
                    <div class="control-value" id="original-resolution">0 x 0 px</div>
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-section-title">Custom Dimensions</h3>
                
                <div class="control-group">
                    <label class="control-label">Width (pixels)</label>
                    <input type="number" class="input-text" id="resize-width" min="1">
                </div>

                <div class="control-group">
                    <label class="control-label">Height (pixels)</label>
                    <input type="number" class="input-text" id="resize-height" min="1">
                </div>

                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" class="checkbox-input" id="lock-ratio" checked>
                        Lock Aspect Ratio
                    </label>
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-section-title">Percentage Presets</h3>
                <div class="grid-select" id="percent-selector">
                    <button class="grid-select-btn" data-percent="25">25%</button>
                    <button class="grid-select-btn" data-percent="50">50%</button>
                    <button class="grid-select-btn" data-percent="75">75%</button>
                    <button class="grid-select-btn" data-percent="200">200%</button>
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-section-title">Scaling Quality</h3>
                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" class="checkbox-input" id="smooth-scaling" checked>
                        Smooth Scaling (Bilinear)
                    </label>
                </div>
            </div>

        </section>
    </div>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/resize.js"></script>
